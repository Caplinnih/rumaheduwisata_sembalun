<style>
html,
body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#f8faf9;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;
}

*{
  box-sizing:border-box;
}

#appFrame{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  height:100dvh;
  border:none;
  display:block;
  background:#f8faf9;
}

#loader{
  position:fixed;
  inset:0;
  z-index:9999;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:16px;
  background:#f8faf9;
  transition:opacity .25s ease,visibility .25s ease;
}

#loader.hide{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}

.spinner{
  width:42px;
  height:42px;
  border-radius:50%;
  border:3px solid #d1fae5;
  border-top-color:#065f46;
  animation:spin .8s linear infinite;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

#loaderText{
  font-size:14px;
  font-weight:600;
  color:#065f46;
}

#configError{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  padding:32px;
  text-align:center;
  background:#f8faf9;
  color:#4b5563;
  line-height:1.7;
  z-index:10000;
}

#configError.show{
  display:flex;
}

#configError code{
  background:#eef2f0;
  padding:2px 6px;
  border-radius:4px;
}
</style>

</head>

<body>

<div id="loader">
  <div class="spinner"></div>
  <div id="loaderText">Memuat aplikasi...</div>
</div>

<div id="configError">
  <div>
    ⚠️ URL Google Apps Script belum dikonfigurasi.<br><br>
    Silakan isi <code>gasExecUrl</code> pada file <code>config.js</code>.
  </div>
</div>

<iframe
  id="appFrame"
  title="Rumah Eduwisata Sembalun"
  allow="clipboard-write">
</iframe>

<script src="config.js"></script>

<script>
(function(){

  const cfg = window.APP_CONFIG || {};

  const frame = document.getElementById("appFrame");
  const loader = document.getElementById("loader");
  const errorBox = document.getElementById("configError");
  const loaderText = document.getElementById("loaderText");

  document.title = cfg.title || "Rumah Eduwisata Sembalun";

  if(cfg.loadingText){
    loaderText.textContent = cfg.loadingText;
  }

  const url = cfg.gasExecUrl || "";

  const valid =
    url &&
    url.indexOf("GANTI_DENGAN") === -1 &&
    /^https:\/\/script\.(googleusercontent|google)\.com\//.test(url);

  if(!valid){
    loader.classList.add("hide");
    errorBox.classList.add("show");
    return;
  }

  frame.src = url;

  let revealed = false;

  function reveal(){
    if(revealed) return;
    revealed = true;
    loader.classList.add("hide");
  }

  frame.addEventListener("load", reveal);

  setTimeout(reveal, 1600);

})();
</script>

</body>
